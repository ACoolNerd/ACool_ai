services:
  # ===== INFRASTRUCTURE =====
  postgres:
    image: postgres:16-alpine
    container_name: acool-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-acool}
      POSTGRES_USER: ${POSTGRES_USER:-acool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-acool} -d ${POSTGRES_DB:-acool}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: acool-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?error} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:latest
    container_name: acool-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?error}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?error}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  create-buckets:
    image: minio/mc:latest
    container_name: acool-create-buckets
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:?error} ${MINIO_ROOT_PASSWORD:?error};
      mc mb -p local/${S3_BUCKET:-acool-assets} || true;
      exit 0;
      "
    networks:
      - acool-network

  # ===== ACOOL SERVICES =====
  acool-ecosystem-api:
    build:
      context: ./services/acool-ecosystem-api
      dockerfile: Dockerfile
    container_name: acool-ecosystem-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-acool}
      POSTGRES_USER: ${POSTGRES_USER:-acool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-acool-assets}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?error}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?error}
      ACoolAI_ENDPOINT: ${ACoolAI_ENDPOINT:?error}
      ACoolAI_MODEL: ${ACoolAI_MODEL:-claude-sonnet-4-6}
      MEAP_PHASE: ${MEAP_PHASE:-2}
      OPERATOR: ${OPERATOR:-ACoolNERD}
      JWT_SECRET: ${JWT_SECRET:?error}
      SESSION_SECRET: ${SESSION_SECRET:?error}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  acool-router:
    build:
      context: ./services/acool-router
      dockerfile: Dockerfile
    container_name: acool-router
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3600
      API_URL: http://acool-ecosystem-api:8080
      SKILLS_API_URL: http://acool-skills-api:3700
    depends_on:
      acool-ecosystem-api:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:3600/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  acool-skills-api:
    build:
      context: ./services/acool-skills-api
      dockerfile: Dockerfile
    container_name: acool-skills-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3700
      SKILLS_DIR: /skills
    volumes:
      - ./skills:/skills:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:3700/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  acool-project:
    build:
      context: ./apps/acool-project
      dockerfile: Dockerfile
    container_name: acool-project
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3100
      APP_TITLE: ACoolPROJECT
      API_URL: http://acool-ecosystem-api:8080
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:3100/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  acool-academy:
    build:
      context: ./apps/acool-academy
      dockerfile: Dockerfile
    container_name: acool-academy
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3200
      APP_TITLE: ACoolACADEMY
      API_URL: http://acool-ecosystem-api:8080
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:3200/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gardy-portal:
    build:
      context: ./apps/gardy-portal
      dockerfile: Dockerfile
    container_name: gardy-portal
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3300
      APP_TITLE: Gardy × ACoolACADEMY Portal
      API_URL: http://acool-ecosystem-api:8080
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:3300/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prompt-runtime:
    build:
      context: ./apps/prompt-runtime
      dockerfile: Dockerfile
    container_name: acool-prompt-runtime
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3400
      APP_TITLE: ACoolECOSYSTEM Prompt Runtime
      API_URL: http://acool-ecosystem-api:8080
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:3400/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  skills-dashboard:
    build:
      context: ./apps/skills-dashboard
      dockerfile: Dockerfile
    container_name: acool-skills-dashboard
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3500
      APP_TITLE: ACoolECOSYSTEM Skills Dashboard
      SKILLS_API_URL: http://acool-skills-api:3700
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://localhost:3500/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 45s
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== WORKERS =====
  acool-worker:
    build:
      context: ./workers/acool-worker
      dockerfile: Dockerfile
    container_name: acool-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?error}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-acool}
      POSTGRES_USER: ${POSTGRES_USER:-acool}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-acool-assets}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:?error}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?error}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== REVERSE PROXY =====
  nginx:
    image: nginx:1.27-alpine
    container_name: acool-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      - acool-ecosystem-api
      - acool-router
      - acool-skills-api
      - acool-project
      - acool-academy
      - gardy-portal
      - prompt-runtime
      - skills-dashboard
    healthcheck:
      test:
        - CMD-SHELL
        - >
          wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 8
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ===== MONITORING =====
  prometheus:
    image: prom/prometheus:latest
    container_name: acool-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:latest
    container_name: acool-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?error}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://grafana.acool.ai
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - acool-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  acool-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  nginx-cache:
