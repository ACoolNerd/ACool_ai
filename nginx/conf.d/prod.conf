server {
    listen 80;
    server_name fashion.acool.ai;

    location = /health {
        default_type application/json;
        return 200 '{"ok":true,"service":"FashionbyKukanaana","mode":"production","governance":"Rights → Disclosure → Proof","timestamp":"$time_iso8601"}';
    }

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><title>FashionbyKukanaana</title></head><body><h1>FashionbyKukanaana</h1><p>Made with LOVE by ACoolNERD with ACoolAI</p></body></html>';
    }
}

